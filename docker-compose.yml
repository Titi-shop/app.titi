services:
  titi:
    container_name: titi

    build:
      context: .
      dockerfile: Dockerfile

      args:
        DATABASE_URL: ${DATABASE_URL}

        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}

        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
